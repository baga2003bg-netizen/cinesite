<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiseStock | Premium Inventory & POS</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        // Icons simulated with SVG for zero-dependency portability
        const Icons = {
            Dashboard: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
            Cart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            Package: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        };

        const INITIAL_INVENTORY = [
            { id: '1', name: 'LG OLED 65" TV', category: 'TVs', brand: 'LG', sku: 'LG-OLED65', priceBuy: 1200, priceSell: 1800, stock: 8, minStock: 3, supplier: 'LG Electronics' },
            { id: '2', name: 'Samsung French Door Fridge', category: 'Refrigerators', brand: 'Samsung', sku: 'SAM-FR-FD', priceBuy: 1500, priceSell: 2200, stock: 4, minStock: 5, supplier: 'Samsung Home' },
            { id: '3', name: 'Dyson V15 Vacuum', category: 'Small Appliances', brand: 'Dyson', sku: 'DYS-V15', priceBuy: 400, priceSell: 650, stock: 2, minStock: 5, supplier: 'Dyson Direct' },
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [inventory, setInventory] = useState(INITIAL_INVENTORY);
            const [notifications, setNotifications] = useState([]);
            const [showImportModal, setShowImportModal] = useState(false);
            const fileInputRef = useRef(null);

            const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);

            const addNotification = (title, message, type = 'info') => {
                const id = Math.random().toString(36).substr(2, 9);
                setNotifications(prev => [{ id, title, message, type }, ...prev]);
                setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 5000);
            };

            const handleUpdateStock = (id, amount) => {
                setInventory(prev => prev.map(item => {
                    if (item.id === id) {
                        const newStock = Math.max(0, item.stock + amount);
                        if (newStock <= item.minStock) addNotification("Low Stock Alert", `${item.name} is running low!`, "warning");
                        return { ...item, stock: newStock };
                    }
                    return item;
                }));
            };

            const downloadTemplate = () => {
                const csv = "Name,Category,Brand,SKU,BuyPrice,SellPrice,Stock,MinStock,Supplier\nSample Product,Electronics,BrandX,SKU001,100,150,50,10,DistributorA";
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'risestock_template.csv';
                a.click();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').filter(r => r.trim());
                    const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
                    const newItems = rows.slice(1).map(row => {
                        const cols = row.split(',').map(c => c.trim());
                        const obj = {};
                        headers.forEach((h, i) => obj[h] = cols[i]);
                        return {
                            id: Math.random().toString(36).substr(2, 9),
                            name: obj.name, category: obj.category, brand: obj.brand, sku: obj.sku,
                            priceBuy: parseFloat(obj.buyprice), priceSell: parseFloat(obj.sellprice),
                            stock: parseInt(obj.stock), minStock: parseInt(obj.minstock), supplier: obj.supplier
                        };
                    });
                    setInventory(prev => [...prev, ...newItems]);
                    addNotification("Success", `Imported ${newItems.length} products.`, "success");
                    setShowImportModal(false);
                };
                reader.readAsText(file);
            };

            return (
                <div className="flex h-screen bg-gray-950 text-gray-100 overflow-hidden font-sans">
                    {/* Toast System */}
                    <div className="fixed top-6 right-6 z-[100] flex flex-col gap-3 w-80">
                        {notifications.map(n => (
                            <div key={n.id} className={`p-4 rounded-2xl shadow-2xl border flex items-start gap-3 animate-fade-in ${
                                n.type === 'warning' ? 'bg-amber-900/40 border-amber-500/50 text-amber-200' : 'bg-gray-900 border-gray-700 text-white'
                            }`}>
                                <Icons.Alert />
                                <div><div className="font-bold text-sm">{n.title}</div><div className="text-xs opacity-80">{n.message}</div></div>
                            </div>
                        ))}
                    </div>

                    {/* Sidebar */}
                    <aside className="w-64 border-r border-gray-800 flex flex-col p-6 space-y-8 bg-gray-900/50">
                        <div className="text-2xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">RiseStock</div>
                        <nav className="flex-col space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:bg-gray-800'}`}><Icons.Dashboard /> Dashboard</button>
                            <button onClick={() => setActiveTab('inventory')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition ${activeTab === 'inventory' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:bg-gray-800'}`}><Icons.Package /> Inventory</button>
                        </nav>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 overflow-y-auto p-8">
                        {activeTab === 'dashboard' ? (
                            <div className="space-y-8 animate-fade-in">
                                <div className="grid grid-cols-3 gap-6">
                                    <div className="bg-gray-900 p-6 rounded-3xl border border-gray-800">
                                        <div className="text-gray-500 text-xs font-bold uppercase mb-1">Stock Value</div>
                                        <div className="text-3xl font-bold">{formatCurrency(inventory.reduce((s,i) => s + (i.priceBuy * i.stock), 0))}</div>
                                    </div>
                                    <div className="bg-gray-900 p-6 rounded-3xl border border-gray-800">
                                        <div className="text-gray-500 text-xs font-bold uppercase mb-1">Low Stock Alerts</div>
                                        <div className="text-3xl font-bold text-amber-500">{inventory.filter(i => i.stock <= i.minStock).length}</div>
                                    </div>
                                    <div className="bg-indigo-600 p-6 rounded-3xl text-white">
                                        <div className="text-white/60 text-xs font-bold uppercase mb-1">Total Items</div>
                                        <div className="text-3xl font-bold">{inventory.length}</div>
                                    </div>
                                </div>
                                <div className="bg-gradient-to-br from-indigo-900 to-purple-900 p-10 rounded-[2.5rem] border border-indigo-500/30">
                                    <h2 className="text-3xl font-bold mb-4">Express Deployment Ready</h2>
                                    <p className="text-indigo-200 max-w-xl mb-6">RiseStock is now configured as a Node.js Express application. You can push this code to a GitHub repository and deploy directly to Render.</p>
                                    <button onClick={() => setActiveTab('inventory')} className="bg-white text-indigo-900 px-6 py-3 rounded-2xl font-bold hover:scale-105 transition">Manage Stock</button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-fade-in">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-bold">Inventory List</h2>
                                    <div className="flex gap-2">
                                        <button onClick={downloadTemplate} className="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm font-bold transition flex items-center gap-2">Template</button>
                                        <button onClick={() => setShowImportModal(true)} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-xl text-sm font-bold transition flex items-center gap-2"><Icons.Upload /> Import CSV</button>
                                    </div>
                                </div>
                                <div className="bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-gray-800/50 text-gray-500 text-xs font-bold uppercase">
                                            <tr><th className="p-4">Product</th><th className="p-4">SKU</th><th className="p-4">Stock Status</th><th className="p-4">Actions</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-800">
                                            {inventory.map(item => (
                                                <tr key={item.id} className="hover:bg-gray-800/30">
                                                    <td className="p-4 font-semibold">{item.name}</td>
                                                    <td className="p-4 text-gray-500">{item.sku}</td>
                                                    <td className="p-4">
                                                        <span className={`px-3 py-1 rounded-full text-xs font-black ${item.stock <= item.minStock ? 'bg-red-900/50 text-red-400 border border-red-500/30' : 'bg-green-900/50 text-green-400 border border-green-500/30'}`}>
                                                            {item.stock} in stock
                                                        </span>
                                                    </td>
                                                    <td className="p-4">
                                                        <div className="flex gap-1">
                                                            <button onClick={() => handleUpdateStock(item.id, 1)} className="p-2 hover:bg-indigo-500/20 text-indigo-400 rounded-lg"><Icons.Plus /></button>
                                                            <button onClick={() => {
                                                                const v = prompt(`Add stock for ${item.name}:`, "10");
                                                                if(v) handleUpdateStock(item.id, parseInt(v));
                                                            }} className="text-xs font-bold text-gray-400 px-2">Bulk Add</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Import Modal */}
                    {showImportModal && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
                            <div className="bg-gray-900 border border-gray-800 rounded-[2.5rem] p-10 w-full max-w-md text-center">
                                <div className="w-20 h-20 bg-indigo-600/20 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Upload /></div>
                                <h3 className="text-2xl font-bold mb-2">Import Inventory</h3>
                                <p className="text-gray-400 text-sm mb-8">Select a CSV file to add multiple products at once. Existing SKUs will be duplicated unless unique.</p>
                                <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept=".csv" />
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => fileInputRef.current.click()} className="w-full py-4 bg-indigo-600 rounded-2xl font-bold hover:bg-indigo-700 transition">Choose File</button>
                                    <button onClick={() => setShowImportModal(false)} className="w-full py-3 text-gray-500 hover:text-white transition font-bold">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
